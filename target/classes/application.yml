spring:
  application:
    name: trae-api
  cloud:
    discovery:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/trae_api?useUnicode=true&characterEncoding=utf-8
    username: trae
    password: passTrae
    driver-class-name: org.postgresql.Driver
  session:
    store-type: hash_map
    timeout: 1800
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /trae-api
    session:
      timeout: 30m
    # HTTP编码配置
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: trae-api-jwt-secret-key-must-be-at-least-32-characters-long-for-security
  expiration: 86400000

security:
  max-fail-count: 3

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    # 打印SQL语句
    log-prefix: "[SQL] "
    # 详细日志配置
    detailed-query-record: true
    # 显示SQL
    show-sql: true
    # 格式化SQL
    pretty-print: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: "Y"
      logic-not-delete-value: "N"